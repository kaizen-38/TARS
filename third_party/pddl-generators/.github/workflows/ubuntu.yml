name: Tests

on: [push, pull_request]

jobs:
  test:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: "3.11"
          - os: ubuntu-24.04
            python-version: "3.14"

    steps:
    - uses: actions/checkout@v6

    - name: Install Apptainer
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:apptainer/ppa
        sudo apt-get update
        sudo apt-get install -y apptainer

    - name: Install dependencies
      run: |
        # ocaml is needed for crewplanning
        sudo apt install ocaml ocamlbuild tox
        curl -LsSf https://astral.sh/uv/install.sh | sh
        apptainer pull scorpion.sif oras://ghcr.io/jendrikseipp/scorpion:latest
        sudo cp scorpion.sif /usr/local/bin/

    - name: Install VAL
      run: |
        sudo apt-get -y install g++ make flex bison
        git clone https://github.com/KCL-Planning/VAL.git
        pushd VAL
        git checkout a5565396007eee73ac36527fbf904142b3077c74
        make clean  # Remove old build artifacts and binaries.
        sed -i 's/-Werror //g' Makefile  # Ignore warnings.
        make -j
        cp validate /usr/local/bin/
        popd
        rm -r VAL

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Show environment
      run: |
        python --version
        python3 -c "import multiprocessing as m; print('CPUs:', m.cpu_count())"

    - name: Run tests
      run: |
        tox -e py
