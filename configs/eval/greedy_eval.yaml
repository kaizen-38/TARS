# Greedy decoding evaluation config — deterministic, reproducible baseline
# Used for all Phase 1 primary results.

decoding:
  do_sample: false
  temperature: 0.01
  top_p: 1.0
  max_new_tokens: 512
  enable_thinking: false      # MUST be false for Phase 1

# Batch size for inference (reduce if OOM)
per_device_eval_batch_size: 1

# VAL validation budget per candidate
max_val_calls_per_candidate: 1

# Per-instance wall-clock timeout in seconds
per_instance_timeout_sec: 120

# Which representations to evaluate
representations:
  - standard
  - anonymized
  - compact

# Output settings
save_raw_generation: true
save_cleaned_plan: true
save_parsed_plan: true
save_val_result: true
save_timing: true
